<!--
  The GA snippet
-->
<!-- Global site tag (gtag.js) - Google Analytics -->
<script defer src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics.id }}"></script>
<script>
  document.addEventListener("DOMContentLoaded", function(event) {
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', '{{ site.google_analytics.id }}', {
      'cookie_prefix': 'TaejooneBlogCookie',
      'cookie_domain': 'taejoone.jeju.onl',
      'cookie_expires': 28 * 24 * 60 * 60
    });

    // page.collection : 비어있는 경우가 많다
    // page.categories.join(), page.tags.join(): 빈문자열 출력
    // --> jekyll 에서는 for 루프를 돌려서 출력

{% if page.layout? and page.layout != 'home' %}
    // tabs, categories/category, tags/tag, post
    gtag('event', 'blog_meta', {
      'event_category': 'layout',
      'event_label': '{{ page.layout }}',
    });

  {% if page.layout=='post' %}
    {% if page.categories.size > 0 %}
        gtag('event', 'blog_meta', {
          'event_category': 'category',
          'event_label': '{{ page.categories.first | slugify }}',
        });
    {% endif %}
  {% else %}
        gtag('event', 'blog_meta', {
          'event_category': 'category',
          'event_label': '{{ page.title | slugify }}',
        });
  {% endif %}
{% endif %}

  });
</script>
